services:
  vault:
    image: hashicorp/vault:1.18
    container_name: vault-local-demo
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: postgres-local-demo
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-vaultadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vaultadminsecret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: redis-local-demo
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redissecret}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD:-redissecret}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-local-demo
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-appuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitsecret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo40:
    image: mongo:4.0
    container_name: mongo40
    ports:
      - "27040:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-mongo_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_root_password}
    volumes:
      - mongo40_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "admin", "-u", "$${MONGO_INITDB_ROOT_USERNAME}", "-p", "$${MONGO_INITDB_ROOT_PASSWORD}", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo70:
    image: mongo:7.0
    container_name: mongo70
    ports:
      - "27070:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-mongo_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_root_password}
    volumes:
      - mongo70_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "admin", "-u", "$${MONGO_INITDB_ROOT_USERNAME}", "-p", "$${MONGO_INITDB_ROOT_PASSWORD}", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  product-service:
    build: .
    container_name: product-service
    ports: ["3001:3001"]
    environment: &product_env
      SERVICE_NAME: product-service
      SERVICE_PORT: 3001
      VAULT_ADDR: http://vault:8200
      VAULT_AUTH_METHOD: token
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      VAULT_DB_DYNAMIC_ENABLED: "true"
      VAULT_DB_MOUNT: database
      VAULT_DB_ROLE: product-service-role
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appdb
      REDIS_SECRET_PATH: secret/data/dev/redis
      RABBITMQ_SECRET_PATH: secret/data/dev/rabbitmq
      PRODUCT_SERVICE_URL: http://product-service:3001
      CUSTOMER_SERVICE_URL: http://customer-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      MONGO_DYNAMIC_ENABLED: "true"
      MONGO_VERSION: "4.0"
      MONGO_VAULT_DB_MOUNT: database
      MONGO_VAULT_DB_CONFIG: mongo40
      MONGO_VAULT_DB_ROLE: mongo40-product-role
      MONGO_HOST: mongo40
      MONGO_PORT: 27017
      MONGO_DATABASE: appdb
      MONGO_AUTH_SOURCE: admin
    volumes: [".:/app", "/app/node_modules"]
    depends_on: &service_deps
      vault: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      mongo40: { condition: service_healthy }
      mongo70: { condition: service_healthy }

  customer-service:
    build: .
    container_name: customer-service
    ports: ["3002:3002"]
    environment:
      <<: *product_env
      SERVICE_NAME: customer-service
      SERVICE_PORT: 3002
      VAULT_DB_ROLE: customer-service-role
      MONGO_DYNAMIC_ENABLED: "false"
    volumes: [".:/app", "/app/node_modules"]
    depends_on: *service_deps

  inventory-service:
    build: .
    container_name: inventory-service
    ports: ["3003:3003"]
    environment:
      <<: *product_env
      SERVICE_NAME: inventory-service
      SERVICE_PORT: 3003
      VAULT_DB_ROLE: inventory-service-role
      MONGO_DYNAMIC_ENABLED: "false"
    volumes: [".:/app", "/app/node_modules"]
    depends_on: *service_deps

  order-service:
    build: .
    container_name: order-service
    ports: ["3004:3004"]
    environment:
      <<: *product_env
      SERVICE_NAME: order-service
      SERVICE_PORT: 3004
      VAULT_DB_ROLE: order-service-role
      MONGO_DYNAMIC_ENABLED: "true"
      MONGO_VERSION: "7.0"
      MONGO_VAULT_DB_CONFIG: mongo70
      MONGO_VAULT_DB_ROLE: mongo70-order-role
      MONGO_HOST: mongo70
      MONGO_PORT: 27017
    volumes: [".:/app", "/app/node_modules"]
    depends_on: *service_deps

  payment-service:
    build: .
    container_name: payment-service
    ports: ["3005:3005"]
    environment:
      <<: *product_env
      SERVICE_NAME: payment-service
      SERVICE_PORT: 3005
      VAULT_DB_ROLE: payment-service-role
      MONGO_DYNAMIC_ENABLED: "false"
    volumes: [".:/app", "/app/node_modules"]
    depends_on: *service_deps

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  mongo40_data:
  mongo70_data:
